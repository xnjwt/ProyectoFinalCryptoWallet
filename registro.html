<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Wallet</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .contenedor { background-color: #1e1e1e; padding: 30px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-top: 0; }
        label { display: block; margin-bottom: 5px; color: #aaa; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #333; background-color: #2a2a2a; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        #consola { background-color: #000; padding: 15px; border-radius: 5px; font-family: monospace; color: #0f0; margin-top: 20px; font-size: 12px; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Crear Billetera</h2>
        
        <label>Correo Electrónico:</label>
        <input type="email" id="email" placeholder="usuario@ejemplo.com">
        
        <label>Contraseña (Mínimo 6 caracteres):</label>
        <input type="password" id="password" placeholder="••••••••">
        
        <button id="btnRegistro">Registrar y Generar Wallet</button>

        <div id="consola">Esperando acción...</div>
    </div>

    <script type="module">
        // Importamos las herramientas de Firebase desde la red
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // Tu configuración pública
        const firebaseConfig = {
            apiKey: "AIzaSyDx_opJK3OYN1asfNUr_A3JuvJ717ZDXb0",
            authDomain: "walletcrypto123-a7233.firebaseapp.com",
            projectId: "walletcrypto123-a7233",
            storageBucket: "walletcrypto123-a7233.firebasestorage.app",
            messagingSenderId: "1001765796374",
            appId: "1:1001765796374:web:2444d2a11231236e561337"
        };

        // Inicializamos Firebase Auth
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const consola = document.getElementById('consola');

        document.getElementById('btnRegistro').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                return consola.innerText = "Error: Llena todos los campos.";
            }

            try {
                // PASO 1: Crear usuario en Firebase Auth
                consola.innerText = "1/3 Creando cuenta en Firebase...";
                const credenciales = await createUserWithEmailAndPassword(auth, email, password);
                const uid = credenciales.user.uid;

                // PASO 2: Generar billetera de Solana localmente
                consola.innerText = "2/3 Generando claves criptográficas...";
                const keypair = solanaWeb3.Keypair.generate();
                const publicKey = keypair.publicKey.toString();
                // La clave privada (keypair.secretKey) nace y se queda aquí. JAMÁS se envía al servidor.

                // PASO 3: Enviar UID y Clave Pública al Backend
                consola.innerText = "3/3 Vinculando wallet en la base de datos...";
                const respuesta = await fetch('http://localhost:3000/api/users/link-wallet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid, email, publicKey })
                });

                const datosServidor = await respuesta.json();

                if (datosServidor.exito) {
                    consola.innerText = `¡ÉXITO!\nUID: ${uid}\nWallet: ${publicKey}\n\nRevisa tu Firestore.`;
                } else {
                    consola.innerText = `Error del servidor: ${datosServidor.error}`;
                }

            } catch (error) {
                // Manejo de errores (ej. contraseña muy corta, correo ya existe)
                consola.innerText = `Error: ${error.message}`;
            }
        });
    </script>
</body>
</html>
